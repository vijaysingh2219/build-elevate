apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: build-elevate-api-hpa
  namespace: build-elevate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: build-elevate-api-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
