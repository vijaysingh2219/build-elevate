apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: build-elevate-web-ingress
  namespace: build-elevate
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Uncomment to enable TLS via cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - yourdomain.com
  #     secretName: build-elevate-tls
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: build-elevate-web-service
                port:
                  number: 3000
