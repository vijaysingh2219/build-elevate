apiVersion: apps/v1
kind: Deployment
metadata:
  name: build-elevate-web-deployment
  namespace: build-elevate
  labels:
    app: build-elevate-web
spec:
  # replicas is intentionally omitted: the HorizontalPodAutoscaler
  # (k8s/web-hpa.yml) owns this value. Setting it here would reset the
  # pod count on every `kubectl apply`, fighting the autoscaler.
  selector:
    matchLabels:
      app: build-elevate-web
  template:
    metadata:
      labels:
        app: build-elevate-web
    spec:
      containers:
        - name: build-elevate-web
          image: vijaysingh2219/build-elevate-web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: build-elevate-web-env
            - configMapRef:
                name: build-elevate-config
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
